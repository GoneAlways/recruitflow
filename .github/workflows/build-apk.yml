name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Capacitor APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Setup Android SDK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          # Install required SDK platforms and build tools
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>&1 | head -5

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: frontend/android
        run: |
          echo "=== Gradle Version ==="
          ./gradlew --version 2>&1 || true
          echo "=== Build ==="
          ./gradlew assembleDebug --no-daemon --info 2>&1
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: List APKs
        if: always()
        run: find frontend/android -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Copy APK
        if: success()
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk recruitflow.apk

      - name: Publish APK to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true
          gh release create dev-latest recruitflow.apk \
            --title "RecruitFlow 最新版" \
            --notes "自动构建 第 ${{ github.run_number }} 次 | 提交 ${{ github.sha }}" \
            --prerelease
