name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Capacitor APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: frontend/android
        run: ./gradlew assembleDebug
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Copy APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk recruitflow.apk

      - name: Publish APK to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true
          gh release create dev-latest recruitflow.apk \
            --title "RecruitFlow 最新版" \
            --notes "自动构建 第 ${{ github.run_number }} 次 | 提交 ${{ github.sha }}" \
            --prerelease
