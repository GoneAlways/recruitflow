name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Capacitor APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build

      - name: Add Android platform
        working-directory: frontend
        run: npx cap add android

      - name: Setup Android SDK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" 2>&1 || true

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK (debug)
        id: build
        working-directory: frontend/android
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee ../build-output.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: frontend/build-output.log
          retention-days: 1

      - name: List APKs
        run: find frontend/android -name "*.apk" -type f 2>/dev/null || echo "No APK found"

      - name: Copy APK
        if: success()
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk recruitflow.apk

      - name: Publish APK to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true
          gh release create dev-latest recruitflow.apk \
            --title "RecruitFlow 最新版" \
            --notes "自动构建 第 ${{ github.run_number }} 次 | 提交 ${{ github.sha }}" \
            --prerelease

      - name: Check build result
        if: steps.build.outcome == 'failure'
        run: |
          echo "BUILD FAILED! Check the build-log artifact for details."
          tail -60 frontend/build-output.log 2>/dev/null || true
