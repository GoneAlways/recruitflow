name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Capacitor iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Capacitor iOS platform
        working-directory: frontend
        run: npm install @capacitor/ios

      - name: Build Next.js (static export)
        working-directory: frontend
        run: npm run build

      - name: Add iOS platform
        working-directory: frontend
        run: npx cap add ios

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync ios

      - name: Allow HTTP cleartext
        run: |
          PLIST="frontend/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" "$PLIST" 2>/dev/null || true

      - name: Build IPA (unsigned)
        working-directory: frontend/ios/App
        run: |
          xcodebuild clean build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r frontend/ios/App/build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r recruitflow.ipa Payload
          rm -rf Payload

      - name: Publish IPA to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ios-dev-latest --yes 2>/dev/null || true
          git push origin :refs/tags/ios-dev-latest 2>/dev/null || true
          gh release create ios-dev-latest recruitflow.ipa \
            --title "RecruitFlow iOS 最新版" \
            --notes "自动构建 第 ${{ github.run_number }} 次 | 提交 ${{ github.sha }}" \
            --prerelease
