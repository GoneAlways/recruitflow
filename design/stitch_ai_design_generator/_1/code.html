<!-- Micro-interactions Script -->
<script>
    // Simple tab switching visual effect
    const tabs = document.querySelectorAll('nav button');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => {
                t.classList.remove('text-primary', 'active-tab');
                t.classList.add('text-on-surface-variant');
            });
            tab.classList.remove('text-on-surface-variant');
            tab.classList.add('text-primary', 'active-tab');
        });
    });

    // Search focus interaction
    const searchInput = document.querySelector('input[type="text"]');
    searchInput.addEventListener('focus', () => {
        searchInput.parentElement.classList.add('scale-[1.02]');
        searchInput.parentElement.classList.add('transition-transform');
    });
    searchInput.addEventListener('blur', () => {
        searchInput.parentElement.classList.remove('scale-[1.02]');
    });
</script>
