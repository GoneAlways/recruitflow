<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>编辑工作经历 - RecruitFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#dfe2ed",
                        "surface": "#f5fafa",
                        "surface-variant": "#dee4e3",
                        "border-subtle": "#E5E6EB",
                        "secondary-fixed-dim": "#c3c6d1",
                        "on-primary-fixed-variant": "#004f50",
                        "primary-fixed": "#7af5f6",
                        "on-secondary-fixed-variant": "#434750",
                        "surface-container-low": "#eff5f4",
                        "surface-container": "#e9efee",
                        "surface-dim": "#d5dbda",
                        "tertiary-container": "#da7d4c",
                        "surface-container-high": "#e4e9e9",
                        "primary-fixed-dim": "#5bd9d9",
                        "on-secondary-fixed": "#181c23",
                        "primary": "#006a6a",
                        "outline-variant": "#bcc9c9",
                        "on-secondary-container": "#5f636c",
                        "surface-bright": "#f5fafa",
                        "status-pending": "#FF7D00",
                        "on-secondary": "#ffffff",
                        "background-surface": "#F7F8FA",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#003434",
                        "on-primary": "#ffffff",
                        "tertiary": "#96481c",
                        "outline": "#6c7a79",
                        "inverse-on-surface": "#ecf2f1",
                        "surface-container-lowest": "#ffffff",
                        "status-offered": "#00B42A",
                        "success-mint": "#00A6A7",
                        "status-rejected": "#F53F3F",
                        "tertiary-fixed": "#ffdbcb",
                        "on-error": "#ffffff",
                        "surface-tint": "#006a6a",
                        "inverse-surface": "#2c3231",
                        "on-tertiary-fixed-variant": "#783204",
                        "on-surface": "#171d1d",
                        "on-primary-fixed": "#002020",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#521e00",
                        "primary-container": "#00a6a7",
                        "on-tertiary-fixed": "#341100",
                        "inverse-primary": "#5bd9d9",
                        "surface-container-highest": "#dee4e3",
                        "on-surface-variant": "#3d4949",
                        "background": "#f5fafa",
                        "tertiary-fixed-dim": "#ffb692",
                        "secondary": "#5b5e68",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "on-background": "#171d1d",
                        "secondary-container": "#dcdfea"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "24px",
                        "gutter-md": "16px",
                        "stack-gap": "8px",
                        "margin-mobile": "16px",
                        "gutter-sm": "12px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "22px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.background-surface');
            -webkit-tap-highlight-color: transparent;
        }
        .form-input {
            transition: all 0.2s ease-in-out;
        }
        .form-input:focus {
            border-color: theme('colors.primary');
            box-shadow: 0 0 0 2px rgba(0, 106, 106, 0.2);
            outline: none;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface antialiased min-h-screen flex flex-col md:flex-row">
<!-- Top App Bar for Desktop (hidden on mobile, transactional page intent) -->
<header class="hidden md:flex justify-between items-center w-full px-margin-desktop h-16 bg-surface border-b border-border-subtle absolute top-0 z-50">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-high rounded-full transition-colors duration-200 text-on-surface-variant" onclick="history.back()">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface">编辑工作经历</h1>
</div>
<div class="text-headline-md font-headline-md font-bold text-primary">RecruitFlow</div>
</header>
<!-- Mobile Header (Sticky) -->
<header class="md:hidden flex items-center justify-between px-margin-mobile h-14 bg-surface sticky top-0 z-50 border-b border-border-subtle shadow-sm">
<button class="p-2 -ml-2 text-on-surface-variant" onclick="history.back()">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-body-lg font-body-lg font-semibold">编辑工作经历</h1>
<button class="p-2 -mr-2 text-primary font-label-md text-label-md">保存</button>
</header>
<!-- Main Canvas Content -->
<main class="flex-1 w-full max-w-[800px] mx-auto md:pt-24 pb-24 px-margin-mobile md:px-margin-desktop mt-4 md:mt-0">
<div class="bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-border-subtle p-gutter-md md:p-margin-desktop overflow-hidden relative">
<form class="space-y-6" id="experienceForm">
<!-- Company Name -->
<div class="space-y-2">
<label class="block text-body-md font-body-md text-on-surface font-medium" for="companyName">公司名称 <span class="text-error">*</span></label>
<div class="relative">
<input class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface placeholder-on-surface-variant/50 focus:bg-surface-container-lowest" id="companyName" name="companyName" placeholder="请输入公司名称" required="" type="text" value="科技发展有限公司"/>
</div>
</div>
<!-- Position -->
<div class="space-y-2">
<label class="block text-body-md font-body-md text-on-surface font-medium" for="position">职位名称 <span class="text-error">*</span></label>
<div class="relative">
<input class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface placeholder-on-surface-variant/50 focus:bg-surface-container-lowest" id="position" name="position" placeholder="请输入职位名称" required="" type="text" value="高级产品经理"/>
</div>
</div>
<!-- Department -->
<div class="space-y-2">
<label class="block text-body-md font-body-md text-on-surface font-medium" for="department">所属部门</label>
<div class="relative">
<input class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface placeholder-on-surface-variant/50 focus:bg-surface-container-lowest" id="department" name="department" placeholder="请输入所属部门（选填）" type="text" value="产品研发部"/>
</div>
</div>
<!-- Start/End Date (Grid Layout for Desktop) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-body-md font-body-md text-on-surface font-medium" for="startDate">入职时间 <span class="text-error">*</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
<input class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg pl-10 pr-4 py-3 text-body-md font-body-md text-on-surface focus:bg-surface-container-lowest" id="startDate" name="startDate" required="" type="month" value="2020-03"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-body-md font-body-md text-on-surface font-medium" for="endDate">离职时间 <span class="text-error">*</span></label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
<input class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg pl-10 pr-4 py-3 text-body-md font-body-md text-on-surface focus:bg-surface-container-lowest" id="endDate" name="endDate" required="" type="month" value="2023-08"/>
</div>
<div class="flex items-center mt-2">
<input class="w-4 h-4 text-primary rounded border-border-subtle focus:ring-primary focus:ring-2 bg-surface" id="currentJob" type="checkbox"/>
<label class="ml-2 text-label-md font-label-md text-on-surface-variant cursor-pointer" for="currentJob">至今</label>
</div>
</div>
</div>
<!-- Job Description -->
<div class="space-y-2 pt-2">
<label class="block text-body-md font-body-md text-on-surface font-medium flex justify-between" for="description">
<span>工作内容 <span class="text-error">*</span></span>
<span class="text-label-sm font-label-sm text-on-surface-variant font-normal">0/2000</span>
</label>
<div class="relative">
<textarea class="form-input w-full bg-surface-bright border border-border-subtle rounded-lg px-4 py-3 text-body-md font-body-md text-on-surface placeholder-on-surface-variant/50 focus:bg-surface-container-lowest resize-y" id="description" name="description" placeholder="请详细描述您的工作职责、参与的项目及取得的业绩..." required="" rows="6">1. 负责核心产品线的整体规划与设计，包括需求分析、产品原型绘制及PRD编写；
2. 协同研发、测试团队推进项目落地，保证产品按时上线，迭代周期缩短20%；
3. 通过数据分析和用户调研，持续优化产品体验，提升用户留存率15%。</textarea>
</div>
</div>
</form>
</div>
<!-- Action Buttons (Desktop Bottom) -->
<div class="hidden md:flex justify-between items-center mt-8 pt-6 border-t border-border-subtle">
<button class="flex items-center gap-2 text-error hover:bg-error-container/20 px-4 py-2 rounded-lg transition-colors text-body-md font-body-md" type="button">
<span class="material-symbols-outlined text-[20px]">delete</span>
                删除经历
            </button>
<div class="flex gap-4">
<button class="px-6 py-2.5 border border-border-subtle text-on-surface bg-surface-container-lowest hover:bg-surface-container-low rounded-xl text-body-md font-body-md font-medium transition-colors" onclick="history.back()" type="button">
                    取消
                </button>
<button class="px-8 py-2.5 bg-primary text-on-primary hover:bg-primary-container hover:text-on-primary-container rounded-xl text-body-md font-body-md font-medium transition-colors shadow-sm" form="experienceForm" type="submit">
                    保存
                </button>
</div>
</div>
</main>
<!-- Mobile Bottom Action Area -->
<div class="md:hidden fixed bottom-0 left-0 w-full p-margin-mobile bg-surface-container-lowest border-t border-border-subtle shadow-[0_-4px_16px_rgba(0,0,0,0.04)] z-40 pb-safe">
<div class="flex gap-3">
<button class="flex-none px-4 py-3 border border-border-subtle text-error bg-surface hover:bg-error-container/10 rounded-xl transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[24px]">delete</span>
</button>
<button class="flex-1 py-3 bg-primary text-on-primary rounded-xl text-body-lg font-body-lg font-medium transition-colors shadow-sm active:scale-[0.98]" form="experienceForm" type="submit">
                保存
            </button>
</div>
</div>
<script>
        // Simple JS for the "Current Job" checkbox logic
        document.getElementById('currentJob').addEventListener('change', function() {
            const endDateInput = document.getElementById('endDate');
            if(this.checked) {
                endDateInput.disabled = true;
                endDateInput.value = '';
                endDateInput.classList.add('opacity-50', 'bg-surface-variant');
            } else {
                endDateInput.disabled = false;
                endDateInput.classList.remove('opacity-50', 'bg-surface-variant');
            }
        });
    </script>
</body></html>
