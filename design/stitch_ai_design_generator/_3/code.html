<script>
        function switchTab(el) {
            const container = el.parentElement;
            const buttons = container.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                btn.classList.add('bg-surface-container-lowest', 'text-on-surface-variant', 'hover:bg-surface-container-high');
            });

            el.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
            el.classList.remove('bg-surface-container-lowest', 'text-on-surface-variant', 'hover:bg-surface-container-high');
            
            // Interaction feedback
            el.style.transform = 'scale(0.95)';
            setTimeout(() => {
                el.style.transform = 'scale(1)';
            }, 100);
        }

        // Simple scroll reveal for cards
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        }, observerOptions);

        document.querySelectorAll('section > div').forEach(card => {
            card.classList.add('opacity-0', 'translate-y-4', 'transition-all', 'duration-500');
            observer.observe(card);
        });
    </script>
